<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RI Plow Watch Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f1218; overflow: hidden; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; height: 100vh !important; width: 100vw !important; z-index: 1; }

        .glass-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(15, 18, 24, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px;
            padding: 15px; color: white; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); width: 220px;
        }

        .credit { font-size: 10px; color: #94a3b8; margin-top: 4px; opacity: 0.8; }
        .instruction { font-size: 11px; color: #60a5fa; margin: 8px 0; font-style: italic; font-weight: bold; }

        #status-modal {
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); z-index: 2000;
            background: #1e293b; padding: 20px; border-radius: 20px;
            border: 1px solid #334155; color: white; width: 260px; text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
        }

        .action-btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-size: 14px;
        }
        .btn-green { background: #10b981; }
        .btn-orange { background: #f59e0b; }
        .btn-red { background: #ef4444; }
        .btn-gray { background: #64748b; }
        .btn-location { background: #3b82f6; margin-top: 10px; }
        .btn-share { background: #8b5cf6; margin-top: 5px; } /* Purple Share Button */
        
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .road-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="glass-panel">
    <h3 style="margin:0; color: #60a5fa;">RI Plow Watch</h3>
    <div class="credit">Created by Charles Medeiros</div>
    <div class="instruction">📍 Click a road to mark status</div>
    <div id="debug-text" style="font-size: 11px; color: #fbbf24; margin: 8px 0;">Status: Connecting...</div>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">
    <div style="font-size: 13px; line-height: 1.6;">
        <div><span class="dot" style="background:#10b981"></span>Plowed</div>
        <div><span class="dot" style="background:#f59e0b"></span>Community Cleared</div>
        <div><span class="dot" style="background:#ef4444"></span>Not Plowed</div>
        <div><span class="dot" style="background:#334155"></span>Unknown</div>
    </div>
    <button class="action-btn btn-location" onclick="findMe()">📍 Find My Street</button>
    <button class="action-btn btn-share" onclick="shareSite()">🔗 Share This Map</button>
</div>

<div id="status-modal">
    <div class="road-label">Updating:</div>
    <h3 id="modal-road-name" style="margin: 5px 0 15px 0; color: #60a5fa;">Road</h3>
    <button class="action-btn btn-green" onclick="updateStatus('plowed')">Plowed (City)</button>
    <button class="action-btn btn-orange" onclick="updateStatus('community')">Community Cleared</button>
    <button class="action-btn btn-red" onclick="updateStatus('not_plowed')">Not Plowed</button>
    <button class="action-btn btn-gray" onclick="updateStatus('unknown')">Reset to Unknown</button>
    <button onclick="closeModal()" style="background:none; border:none; color:#94a3b8; cursor:pointer; margin-top:10px;">Cancel</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWDc6CnSnDUkUFROTbWP196RJ5i1ZNqmw",
        authDomain: "ri-snow-mpa.firebaseapp.com",
        projectId: "ri-snow-mpa",
        storageBucket: "ri-snow-mpa.firebasestorage.app",
        messagingSenderId: "372597950937",
        appId: "1:372597950937:web:52b0651133e2e7256571c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const debug = document.getElementById('debug-text');
    let activeRoadId = null;
    let roadLayers = {}; 

    const map = L.map('map', { zoomControl: false }).setView([41.82, -71.41], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19, attribution: '&copy; CartoDB'
    }).addTo(map);

    map.whenReady(() => { setTimeout(() => { map.invalidateSize(); }, 300); });

    window.findMe = () => map.locate({setView: true, maxZoom: 16});
    map.on('locationfound', (e) => {
        L.circle(e.latlng, { radius: e.accuracy / 2, color: '#3b82f6' }).addTo(map);
    });

    // Share logic
    window.shareSite = async () => {
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'RI Plow Watch',
                    text: 'Check out the live snow plow status for Rhode Island roads!',
                    url: window.location.href
                });
            } catch (err) {
                console.log('Share cancelled or failed');
            }
        } else {
            // Fallback for browsers that don't support Web Share API
            navigator.clipboard.writeText(window.location.href);
            alert("Link copied to clipboard!");
        }
    };

    fetch('./ri-roads.json')
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, {
                style: (feature) => ({
                    color: "transparent", 
                    weight: 25, 
                    opacity: 0
                }),
                onEachFeature: (feature, layer) => {
                    const roadId = String(feature.properties.OBJECTID);
                    
                    const visibleLine = L.geoJSON(feature, {
                        style: { color: "#334155", weight: 2.5, opacity: 0.5 }
                    }).addTo(map);

                    roadLayers[roadId] = visibleLine;

                    layer.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        activeRoadId = roadId;
                        document.getElementById('modal-road-name').innerText = feature.properties.St_Full || "Rhode Island Road";
                        document.getElementById('status-modal').style.display = 'block';
                    });
                }
            }).addTo(map);

            debug.innerText = "Status: Syncing...";
            
            onSnapshot(collection(db, "roads"), (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    const roadId = change.doc.id;
                    const layerGroup = roadLayers[roadId];
                    
                    if (layerGroup) {
                        const layer = Object.values(layerGroup._layers)[0];
                        
                        if (change.type === "removed") {
                            layer.setStyle({ color: "#334155", weight: 2.5, opacity: 0.5 });
                        } else {
                            const status = change.doc.data().status;
                            let color = '#334155';
                            if (status === 'plowed') color = '#10b981';
                            else if (status === 'community') color = '#f59e0b';
                            else if (status === 'not_plowed') color = '#ef4444';
                            layer.setStyle({ color: color, weight: 6, opacity: 1 });
                        }
                    }
                });
                debug.innerText = "Status: System Online";
                debug.style.color = "#10b981";
            });
        });

    window.updateStatus = async (status) => {
        if (!activeRoadId) return;
        const roadRef = doc(db, "roads", activeRoadId);
        try {
            if (status === 'unknown') {
                await deleteDoc(roadRef);
            } else {
                await setDoc(roadRef, { status, updated: Date.now() }, { merge: true });
            }
        } catch (e) { console.error("Update failed:", e); }
        closeModal();
    };

    window.closeModal = () => {
        document.getElementById('status-modal').style.display = 'none';
        activeRoadId = null;
    };
</script>
</body>
</html>
