<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RI Plow Watch Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f1218; overflow: hidden; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; height: 100vh !important; width: 100vw !important; z-index: 1; }
        
        .glass-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(15, 18, 24, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px;
            padding: 15px; color: white; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); width: 240px;
            max-height: 85vh; overflow-y: auto;
        }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 3000; backdrop-filter: blur(8px);
        }
        .modal-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1e293b; padding: 25px; border-radius: 20px;
            border: 1px solid #334155; color: white; width: 320px; text-align: center;
        }

        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; 
            border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box;
        }

        .action-btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-size: 14px;
            transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.95); }
        .btn-green { background: #10b981; }
        .btn-orange { background: #f59e0b; }
        .btn-purple { background: #8b5cf6; }
        .btn-red { background: #ef4444; }
        .btn-gray { background: #64748b; }
        .btn-blue { background: #3b82f6; }
        .btn-outline { background: transparent; border: 1px solid #94a3b8; color: #94a3b8; }

        .credit { font-size: 10px; color: #94a3b8; margin-top: 4px; }
        .instruction { font-size: 11px; color: #60a5fa; margin: 8px 0; font-style: italic; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

<div id="auth-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 id="auth-title">Join Plow Watch</h2>
        <input type="email" id="auth-email" placeholder="Email Address">
        <input type="password" id="auth-password" placeholder="Password">
        <div id="signup-only">
            <select id="auth-role">
                <option value="customer">Homeowner (Needs Plow)</option>
                <option value="driver">Plow Driver (Has Equipment)</option>
            </select>
        </div>
        <button class="action-btn btn-green" onclick="handleAuth()">Continue</button>
        <button class="action-btn btn-outline" onclick="toggleAuthMode()" id="auth-toggle-text">Login instead</button>
        <button onclick="closeAuthModal()" style="color:#94a3b8; background:none; border:none; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="welcome-modal" class="modal-overlay" style="display: block;">
    <div class="modal-content">
        <h2 style="margin-top: 0; color: #60a5fa;">❄️ RI Plow Watch</h2>
        <p style="font-size: 14px; color: #94a3b8;">Help your neighbors navigate the storm!</p>
        <button class="action-btn btn-green" onclick="closeWelcome()">Start Reporting</button>
    </div>
</div>

<div class="glass-panel">
    <h3 style="margin:0; color: #60a5fa;">RI Plow Watch Pro</h3>
    <div class="credit">Charles Medeiros | cmedeiros133@gmail.com</div>
    
    <div id="user-section" style="margin-top:15px;">
        <button id="login-btn" class="action-btn btn-blue" onclick="openAuthModal()">🔑 Login / Sign Up</button>
        <div id="logged-in-ui" style="display:none;">
            <div id="user-welcome" style="color:#10b981; font-weight:bold; margin-bottom:5px;">Welcome!</div>
            <div id="customer-tools" style="display:none;">
                <button class="action-btn btn-purple" onclick="requestPlow()">❄️ Request Driveway Plow</button>
            </div>
            <button class="action-btn btn-outline" onclick="handleLogout()" style="font-size:10px; padding:5px;">Logout</button>
        </div>
    </div>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
    
    <div class="instruction">📍 Tap a road to mark status</div>
    <div id="debug-text" style="font-size: 11px; color: #fbbf24; margin: 8px 0;">Status: Connecting...</div>
    
    <div style="font-size: 13px; line-height: 1.6;">
        <div><span class="dot" style="background:#10b981"></span>Plowed</div>
        <div><span class="dot" style="background:#f59e0b"></span>Community Cleared</div>
        <div><span class="dot" style="background:#8b5cf6"></span>Needs Widening</div>
        <div><span class="dot" style="background:#ef4444"></span>Not Plowed</div>
    </div>
    
    <button class="action-btn btn-blue" style="margin-top:10px;" onclick="findMe()">📍 Find My Street</button>
    <button class="action-btn btn-gray" onclick="shareSite()">🔗 Share Map</button>
</div>

<div id="status-modal" class="modal-overlay">
    <div class="modal-content">
        <div style="font-size: 10px; color: #94a3b8; text-transform: uppercase;">Updating:</div>
        <h3 id="modal-road-name" style="margin: 5px 0; color: #60a5fa;">Road</h3>
        <span id="modal-last-update" style="font-size: 12px; color: #fbbf24; margin-bottom: 15px; display: block;"></span>
        
        <button class="action-btn btn-green" onclick="updateStatus('plowed')">Plowed (City)</button>
        <button class="action-btn btn-orange" onclick="updateStatus('community')">Community Cleared</button>
        <button class="action-btn btn-purple" onclick="updateStatus('widening')">Needs Widening</button>
        <button class="action-btn btn-red" onclick="updateStatus('not_plowed')">Not Plowed</button>
        <button class="action-btn btn-gray" onclick="updateStatus('unknown')">Reset to Unknown</button>
        <button onclick="closeStatusModal()" style="background:none; border:none; color:#94a3b8; cursor:pointer; margin-top:10px;">Cancel</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWDc6CnSnDUkUFROTbWP196RJ5i1ZNqmw",
        authDomain: "ri-snow-mpa.firebaseapp.com",
        projectId: "ri-snow-mpa",
        storageBucket: "ri-snow-mpa.firebasestorage.app",
        messagingSenderId: "372597950937",
        appId: "1:372597950937:web:52b0651133e2e7256571c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const analytics = getAnalytics(app);
    const debug = document.getElementById('debug-text');

    let activeRoadId = null;
    let roadLayers = {}; 
    let roadLiveStats = {};
    let isSignUpMode = true;

    const map = L.map('map', { zoomControl: false }).setView([41.82, -71.41], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19, attribution: '&copy; CartoDB'
    }).addTo(map);

    // --- AUTH LOGIC ---
    window.openAuthModal = () => document.getElementById('auth-modal').style.display = 'block';
    window.closeAuthModal = () => document.getElementById('auth-modal').style.display = 'none';
    window.toggleAuthMode = () => {
        isSignUpMode = !isSignUpMode;
        document.getElementById('auth-title').innerText = isSignUpMode ? "Join Plow Watch" : "Welcome Back";
        document.getElementById('signup-only').style.display = isSignUpMode ? "block" : "none";
        document.getElementById('auth-toggle-text').innerText = isSignUpMode ? "Login instead" : "Need an account? Sign Up";
    };

    window.handleAuth = async () => {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const role = document.getElementById('auth-role').value;
        try {
            if (isSignUpMode) {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", cred.user.uid), { email, role, createdAt: serverTimestamp() });
            } else {
                await signInWithEmailAndPassword(auth, email, password);
            }
            closeAuthModal();
        } catch (e) { alert(e.message); }
    };

    window.handleLogout = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
        const loggedInUI = document.getElementById('logged-in-ui');
        const loginBtn = document.getElementById('login-btn');
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            const role = userDoc.exists() ? userDoc.data().role : 'customer';
            loginBtn.style.display = 'none';
            loggedInUI.style.display = 'block';
            document.getElementById('user-welcome').innerText = `👋 ${role.toUpperCase()}`;
            document.getElementById('customer-tools').style.display = role === 'customer' ? 'block' : 'none';
        } else {
            loginBtn.style.display = 'block';
            loggedInUI.style.display = 'none';
        }
    });

    // --- ROAD & JOB LOGIC ---
    window.requestPlow = async () => {
        const center = map.getCenter();
        try {
            await addDoc(collection(db, "jobs"), {
                userId: auth.currentUser.uid,
                lat: center.lat,
                lng: center.lng,
                status: 'pending',
                timestamp: serverTimestamp()
            });
            alert("Plow request posted at your map center!");
        } catch (e) { console.error(e); }
    };

    window.updateStatus = async (status) => {
        if (!activeRoadId) return;
        const roadRef = doc(db, "roads", activeRoadId);
        try {
            if (status === 'unknown') { await deleteDoc(roadRef); } 
            else { await setDoc(roadRef, { status, updated: serverTimestamp() }, { merge: true }); }
        } catch (e) { console.error(e); }
        closeStatusModal();
    };

    // Original time function
    function timeSince(date) {
        if (!date) return "";
        const seconds = Math.floor((new Date() - date) / 1000);
        let interval = seconds / 3600;
        if (interval > 1) return Math.floor(interval) + "h ago";
        interval = seconds / 60;
        if (interval > 1) return Math.floor(interval) + "m ago";
        return "Just now";
    }

    // --- MAP EVENTS ---
    window.findMe = () => {
        map.locate({setView: true, maxZoom: 17});
    };

    map.on('locationfound', (e) => {
        L.circle(e.latlng, { radius: 15, color: '#3b82f6', fillOpacity: 0.5 }).addTo(map);
    });

    window.closeWelcome = () => document.getElementById('welcome-modal').style.display = 'none';
    window.closeStatusModal = () => {
        document.getElementById('status-modal').style.display = 'none';
        activeRoadId = null;
    };

    // Load GeoJSON Roads
    fetch('./ri-roads.json')
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, {
                style: () => ({ color: "transparent", weight: 45, opacity: 0 }),
                onEachFeature: (feature, layer) => {
                    const roadId = String(feature.properties.OBJECTID);
                    const roadName = feature.properties.St_Full || "Rhode Island Road";
                    const visibleLine = L.geoJSON(feature, {
                        style: { color: "#334155", weight: 3, opacity: 0.6, lineCap: 'round' },
                        interactive: false
                    }).addTo(map);
                    roadLayers[roadId] = visibleLine;
                    layer.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        activeRoadId = roadId;
                        document.getElementById('modal-road-name').innerText = roadName;
                        const stats = roadLiveStats[roadId];
                        document.getElementById('modal-last-update').innerText = (stats && stats.updated) ? `Last: ${timeSince(stats.updated.toDate())}` : "No reports";
                        document.getElementById('status-modal').style.display = 'block';
                    });
                }
            }).addTo(map);

            // Sync Road Status
            onSnapshot(collection(db, "roads"), (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    const roadId = change.doc.id;
                    const data = change.doc.data();
                    roadLiveStats[roadId] = data;
                    const layerGroup = roadLayers[roadId];
                    if (layerGroup) {
                        const layer = Object.values(layerGroup._layers)[0];
                        if (change.type === "removed") {
                            layer.setStyle({ color: "#334155", weight: 3, opacity: 0.6 });
                        } else {
                            const colors = { plowed: '#10b981', community: '#f59e0b', widening: '#8b5cf6', not_plowed: '#ef4444' };
                            layer.setStyle({ color: colors[data.status] || '#334155', weight: 6, opacity: 1 });
                        }
                    }
                });
                debug.innerText = "Status: Live Tracking Active";
                debug.style.color = "#10b981";
            });

            // Sync Job Markers
            onSnapshot(collection(db, "jobs"), (snapshot) => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        L.marker([data.lat, data.lng]).addTo(map).bindPopup("Driveway Plow Request");
                    }
                });
            });
        });

    window.shareSite = async () => {
        if (navigator.share) {
            try { await navigator.share({ title: 'RI Plow Watch', url: window.location.href }); } catch (err) {}
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert("Link copied!");
        }
    };
</script>
</body>
</html>
