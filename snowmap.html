<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RI Plow Watch Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: #0f1218; }
        #map { height: 100vh; width: 100%; z-index: 1; background: #0f1218; }

        .glass-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px; padding: 24px; color: white;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            max-width: 280px;
        }

        h1 { font-size: 1.3rem; margin: 0 0 12px 0; font-weight: 700; color: #60a5fa; }
        .legend { margin: 15px 0; }
        .status-row { display: flex; align-items: center; margin: 8px 0; font-size: 0.95rem; opacity: 0.9; }
        .dot { width: 14px; height: 14px; border-radius: 4px; margin-right: 12px; }
        .green { background: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .red { background: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .gray { background: #4b5563; }
        
        button {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: #3b82f6; color: white; font-weight: 600; cursor: pointer;
            margin-top: 10px; transition: 0.2s;
        }
        button:hover { background: #2563eb; }

        .leaflet-tooltip {
            background: rgba(15, 18, 24, 0.9);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <h1>RI Plow Watch</h1>
    <p style="font-size: 0.85rem; opacity: 0.7;">Click a road to update status.</p>
    <div class="legend">
        <div class="status-row"><div class="dot green"></div> Plowed</div>
        <div class="status-row"><div class="dot red"></div> Not Plowed</div>
        <div class="status-row"><div class="dot gray"></div> Unknown</div>
    </div>
    <button onclick="map.locate({setView: true, maxZoom: 16})">My Location</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWDc6CnSnDUkUFROTbWP196RJ5i1ZNqmw",
        authDomain: "ri-snow-mpa.firebaseapp.com",
        projectId: "ri-snow-mpa",
        storageBucket: "ri-snow-mpa.firebasestorage.app",
        messagingSenderId: "372597950937",
        appId: "1:372597950937:web:52b0651133e2e7256571c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const map = L.map('map', { zoomControl: false }).setView([41.7, -71.5], 11);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // CHANGED: Added error logging for the fetch
    fetch('ri-roads.json')
        .then(res => {
            if (!res.ok) throw new Error("Could not find ri-roads.json - check file name on GitHub!");
            return res.json();
        })
        .then(data => {
            console.log("Road data loaded successfully!");
            L.geoJSON(data, {
                style: { 
                    color: "#334155", 
                    weight: 3, 
                    opacity: 0.6,
                    lineJoin: 'round'
                },
                onEachFeature: (feature, layer) => {
                    const roadId = feature.properties.OBJECTID;
                    const roadName = feature.properties.St_Full || "Unknown Road";

                    layer.bindTooltip(roadName, { sticky: true });

                    onSnapshot(doc(db, "roads", String(roadId)), (snapshot) => {
                        if (snapshot.exists()) {
                            const status = snapshot.data().status;
                            layer.setStyle({
                                color: status === 'plowed' ? '#10b981' : '#ef4444',
                                weight: 6, 
                                opacity: 1
                            });
                        }
                    });

                    layer.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        const status = confirm(`Mark ${roadName} as PLOWED? (Cancel for Not Plowed)`) ? 'plowed' : 'not_plowed';
                        
                        setDoc(doc(db, "roads", String(roadId)), {
                            status: status,
                            roadName: roadName,
                            updated: Date.now()
                        }, { merge: true }).catch(err => alert("Error saving: " + err.message));
                    });
                }
            }).addTo(map);
        })
        .catch(err => console.error(err));
    
    window.map = map;
</script>
</body>
</html>
