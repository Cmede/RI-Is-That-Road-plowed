<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RI Plow Watch Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* This part is critical - without it, the map height is 0px */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #0f1218; overflow: hidden; 
        }
        #map { 
            position: absolute; 
            top: 0; bottom: 0; left: 0; right: 0;
            width: 100%; height: 100%;
            z-index: 1; 
        }

        .glass-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(15, 18, 24, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px; padding: 24px; color: white;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            max-width: 280px;
        }

        h1 { font-size: 1.3rem; margin: 0 0 12px 0; font-weight: 700; color: #60a5fa; }
        .legend { margin: 15px 0; }
        .status-row { display: flex; align-items: center; margin: 8px 0; font-size: 0.95rem; }
        .dot { width: 14px; height: 14px; border-radius: 4px; margin-right: 12px; }
        .green { background: #10b981; }
        .red { background: #ef4444; }
        .gray { background: #4b5563; }
        
        button {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: #3b82f6; color: white; font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <h1>RI Plow Watch</h1>
    <div id="loading-status" style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px;">Loading roads...</div>
    <div class="legend">
        <div class="status-row"><div class="dot green"></div> Plowed</div>
        <div class="status-row"><div class="dot red"></div> Not Plowed</div>
        <div class="status-row"><div class="dot gray"></div> Unknown</div>
    </div>
    <button onclick="map.locate({setView: true, maxZoom: 16})">My Location</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWDc6CnSnDUkUFROTbWP196RJ5i1ZNqmw",
        authDomain: "ri-snow-mpa.firebaseapp.com",
        projectId: "ri-snow-mpa",
        storageBucket: "ri-snow-mpa.firebasestorage.app",
        messagingSenderId: "372597950937",
        appId: "1:372597950937:web:52b0651133e2e7256571c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const map = L.map('map', { zoomControl: false }).setView([41.7, -71.5], 11);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // This handles the loading of your JSON file
    fetch('ri-roads.json')
        .then(res => {
            if (!res.ok) throw new Error("File not found");
            return res.json();
        })
        .then(data => {
            document.getElementById('loading-status').innerText = "Roads Active";
            
            L.geoJSON(data, {
                style: { color: "#334155", weight: 3, opacity: 0.6 },
                onEachFeature: (feature, layer) => {
                    const roadId = feature.properties.OBJECTID;
                    const roadName = feature.properties.St_Full || "RI Road";

                    // Sync with Firestore
                    onSnapshot(doc(db, "roads", String(roadId)), (snapshot) => {
                        if (snapshot.exists()) {
                            const status = snapshot.data().status;
                            layer.setStyle({
                                color: status === 'plowed' ? '#10b981' : '#ef4444',
                                weight: 6, opacity: 1
                            });
                        }
                    });

                    layer.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        const status = confirm(`Mark ${roadName} as PLOWED?`) ? 'plowed' : 'not_plowed';
                        setDoc(doc(db, "roads", String(roadId)), {
                            status: status,
                            updated: Date.now()
                        }, { merge: true });
                    });
                }
            }).addTo(map);
            
            // Forces the map to redraw after everything loads
            setTimeout(() => { map.invalidateSize(); }, 500);
        })
        .catch(err => {
            document.getElementById('loading-status').innerText = "Error loading data.";
            console.error(err);
        });
    
    window.map = map;
</script>
</body>
</html>
