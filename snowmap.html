<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RI Plow Watch Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #0f1218; overflow: hidden; font-family: sans-serif;
        }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; width: 100%; height: 100%; z-index: 1; }

        /* UI Panels */
        .glass-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(15, 18, 24, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px; padding: 20px; color: white;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            max-width: 260px;
        }

        /* Status Modal */
        #status-modal {
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); z-index: 2000;
            background: #1e293b; padding: 25px; border-radius: 20px;
            border: 1px solid #334155; color: white; width: 280px; text-align: center;
        }

        h1 { font-size: 1.2rem; margin: 0 0 10px 0; color: #60a5fa; }
        .legend-item { display: flex; align-items: center; margin: 8px 0; font-size: 0.9rem; }
        .dot { width: 12px; height: 12px; border-radius: 3px; margin-right: 10px; }
        
        /* Status Colors */
        .green { background: #10b981; }
        .orange { background: #f59e0b; }
        .red { background: #ef4444; }
        .gray { background: #4b5563; }
        
        .action-btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            border: none; border-radius: 10px; cursor: pointer;
            font-weight: bold; color: white; transition: 0.2s;
        }
        .btn-green { background: #10b981; }
        .btn-orange { background: #f59e0b; }
        .btn-red { background: #ef4444; }
        .btn-gray { background: #4b5563; }
        .btn-cancel { background: transparent; color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>

<div class="glass-panel">
    <h1>RI Plow Watch</h1>
    <div id="loading-status" style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 12px;">Connecting...</div>
    <div class="legend">
        <div class="legend-item"><div class="dot green"></div> City Plowed</div>
        <div class="legend-item"><div class="dot orange"></div> Community Cleared</div>
        <div class="legend-item"><div class="dot red"></div> Not Plowed</div>
        <div class="legend-item"><div class="dot gray"></div> Unknown</div>
    </div>
    <button onclick="map.locate({setView: true, maxZoom: 16})" style="width:100%; padding:10px; border-radius:8px; cursor:pointer;">My Location</button>
</div>

<div id="status-modal">
    <h3 id="modal-road-name" style="margin-top:0;">Update Road</h3>
    <button class="action-btn btn-green" onclick="updateStatus('plowed')">Plowed (City)</button>
    <button class="action-btn btn-orange" onclick="updateStatus('community')">Community Cleared</button>
    <button class="action-btn btn-red" onclick="updateStatus('not_plowed')">Not Plowed</button>
    <button class="action-btn btn-gray" onclick="updateStatus('unknown')">Reset to Unknown</button>
    <button class="action-btn btn-cancel" onclick="closeModal()">Cancel</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWDc6CnSnDUkUFROTbWP196RJ5i1ZNqmw",
        authDomain: "ri-snow-mpa.firebaseapp.com",
        projectId: "ri-snow-mpa",
        storageBucket: "ri-snow-mpa.firebasestorage.app",
        messagingSenderId: "372597950937",
        appId: "1:372597950937:web:52b0651133e2e7256571c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let activeRoadId = null;

    const map = L.map('map', { zoomControl: false }).setView([41.72, -71.45], 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    fetch('ri-roads.json')
        .then(res => res.json())
        .then(data => {
            document.getElementById('loading-status').innerText = "System Ready • Click Road";
            
            L.geoJSON(data, {
                style: { color: "#334155", weight: 3, opacity: 0.6 },
                onEachFeature: (feature, layer) => {
                    const roadId = feature.properties.OBJECTID;
                    const roadName = feature.properties.St_Full || "Rhode Island Road";

                    onSnapshot(doc(db, "roads", String(roadId)), (snapshot) => {
                        if (snapshot.exists()) {
                            const status = snapshot.data().status;
                            let color = '#ef4444'; 
                            if (status === 'plowed') color = '#10b981';
                            else if (status === 'community') color = '#f59e0b';
                            else if (status === 'unknown') color = '#334155'; // Back to gray
                            
                            layer.setStyle({ color: color, weight: 6, opacity: 1 });
                        } else {
                            layer.setStyle({ color: "#334155", weight: 3, opacity: 0.6 });
                        }
                    });

                    layer.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        activeRoadId = roadId;
                        document.getElementById('modal-road-name').innerText = roadName;
                        document.getElementById('status-modal').style.display = 'block';
                    });
                }
            }).addTo(map);
        });

    // Global functions for modal
    window.updateStatus = async (status) => {
        if (!activeRoadId) return;
        const roadRef = doc(db, "roads", String(activeRoadId));
        
        if (status === 'unknown') {
            await deleteDoc(roadRef); // Removing from DB resets it to default gray
        } else {
            await setDoc(roadRef, { status, updated: Date.now() }, { merge: true });
        }
        closeModal();
    };

    window.closeModal = () => {
        document.getElementById('status-modal').style.display = 'none';
        activeRoadId = null;
    };

    window.map = map;
</script>
</body>
</html>
