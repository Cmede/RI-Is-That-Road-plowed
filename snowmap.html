<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RI Plow Watch Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f1218; overflow: hidden; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; width: 100%; height: 100%; z-index: 1; }

        /* Modern Glass UI */
        .glass-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(15, 18, 24, 0.9);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 15px; color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 220px;
        }

        #status-modal {
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); z-index: 2000;
            background: #1e293b; padding: 20px; border-radius: 20px;
            border: 1px solid #334155; color: white; width: 260px; text-align: center;
        }

        .action-btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            border: none; border-radius: 10px; cursor: pointer;
            font-weight: bold; color: white; font-size: 14px;
        }
        .btn-green { background: #10b981; }
        .btn-orange { background: #f59e0b; }
        .btn-red { background: #ef4444; }
        .btn-gray { background: #64748b; }
        .btn-cancel { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

<div class="glass-panel">
    <h3 style="margin:0 0 10px 0; color: #60a5fa;">RI Plow Watch</h3>
    <div id="debug-text" style="font-size: 11px; color: #94a3b8; margin-bottom: 10px;">Status: Initializing...</div>
    <div style="font-size: 13px; line-height: 1.6;">
        <div><span class="dot" style="background:#10b981"></span>Plowed (City)</div>
        <div><span class="dot" style="background:#f59e0b"></span>Community Cleared</div>
        <div><span class="dot" style="background:#ef4444"></span>Not Plowed</div>
        <div><span class="dot" style="background:#334155"></span>Unknown</div>
    </div>
</div>

<div id="status-modal">
    <h3 id="modal-road-name" style="margin-top:0;">Update Road</h3>
    <button class="action-btn btn-green" onclick="updateStatus('plowed')">Plowed (City)</button>
    <button class="action-btn btn-orange" onclick="updateStatus('community')">Community Cleared</button>
    <button class="action-btn btn-red" onclick="updateStatus('not_plowed')">Not Plowed</button>
    <button class="action-btn btn-gray" onclick="updateStatus('unknown')">Reset to Unknown</button>
    <button class="action-btn btn-cancel" onclick="closeModal()">Cancel</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWDc6CnSnDUkUFROTbWP196RJ5i1ZNqmw",
        authDomain: "ri-snow-mpa.firebaseapp.com",
        projectId: "ri-snow-mpa",
        storageBucket: "ri-snow-mpa.firebasestorage.app",
        messagingSenderId: "372597950937",
        appId: "1:372597950937:web:52b0651133e2e7256571c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const debug = document.getElementById('debug-text');
    let activeRoadId = null;

    // Center map on Rhode Island
    const map = L.map('map', { zoomControl: false }).setView([41.7, -71.5], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    debug.innerText = "Status: Loading Road Data...";

    // Load the road file
    fetch('ri-roads.json')
        .then(res => {
            if (!res.ok) throw new Error('File not found');
            return res.json();
        })
        .then(data => {
            debug.innerText = "Status: Rendering Map...";
            L.geoJSON(data, {
                style: { color: "#334155", weight: 2, opacity: 0.5 },
                onEachFeature: (feature, layer) => {
                    const roadId = feature.properties.OBJECTID;
                    const roadName = feature.properties.St_Full || "Rhode Island Road";

                    // Listen for real-time updates from Firebase
                    onSnapshot(doc(db, "roads", String(roadId)), (snap) => {
                        if (snap.exists()) {
                            const status = snap.data().status;
                            let color = '#334155'; // Default
                            if (status === 'plowed') color = '#10b981';
                            else if (status === 'community') color = '#f59e0b';
                            else if (status === 'not_plowed') color = '#ef4444';
                            layer.setStyle({ color: color, weight: 5, opacity: 1 });
                        } else {
                            layer.setStyle({ color: "#334155", weight: 2, opacity: 0.5 });
                        }
                    });

                    layer.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        activeRoadId = roadId;
                        document.getElementById('modal-road-name').innerText = roadName;
                        document.getElementById('status-modal').style.display = 'block';
                    });
                }
            }).addTo(map);
            debug.innerText = "Status: Online";
        })
        .catch(err => {
            debug.innerText = "Status: Error loading ri-roads.json";
            console.error(err);
        });

    window.updateStatus = async (status) => {
        if (!activeRoadId) return;
        const roadRef = doc(db, "roads", String(activeRoadId));
        if (status === 'unknown') {
            await deleteDoc(roadRef);
        } else {
            await setDoc(roadRef, { status, updated: Date.now() }, { merge: true });
        }
        closeModal();
    };

    window.closeModal = () => {
        document.getElementById('status-modal').style.display = 'none';
        activeRoadId = null;
    };

    window.map = map;
</script>
</body>
</html>
